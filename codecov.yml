coverage:
  status:
    project:
      default:
        target: auto
        threshold: 1%
        informational: true
    patch:
      default:
        target: 60%
        threshold: 0%

comment:
  layout: "reach, diff, flags, files"
  behavior: default
  require_changes: false

ignore:
  - "**/Views/**"
  - "**/Controls/**"
  - "**/*.xaml.cs"
  - "**/*.g.cs"
  - "Boutique.Tests/**"
